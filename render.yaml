# Blueprint Render pour le back-end ShopTaSapp.
# Importe ce dépôt sur Render (New + > Blueprint) pour créer le service.
services:
  - type: web
    name: shoptasapp-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Généré automatiquement par Render
      - key: JWT_SECRET
        generateValue: true
      # À renseigner dans le dashboard Render (valeurs sensibles)
      - key: ADMIN_EMAIL
        value: admin@shoptasapp.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      # Base PostgreSQL (Neon) — connection string
      - key: DATABASE_URL
        sync: false
      # Stockage d'images Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # URL du front Vercel (ex. https://shoptasapp.vercel.app)
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # SMTP (facultatif — sinon e-mails en console)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: ShopTaSapp <no-reply@shoptasapp.com>
    # Données dans PostgreSQL (Neon) et images dans Cloudinary :
    # aucun disque persistant nécessaire, compatible plan gratuit Render.
